<!DOCTYPE html>
<html lang="es-MX">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>100 Papás Dijeron</title>
  <style>
    :root {
      --bg1: #210047;
      --bg2: #7b0fb6;
      --bg3: #ff2fa3;
      --cyan: #00e8ff;
      --cyan2: #0778ff;
      --gold: #ffd85a;
      --gold2: #ff9e00;
      --red: #ff214f;
      --fuchsia: #ff2eea;
      --panel: rgba(10, 13, 46, .88);
      --panel2: rgba(24, 10, 67, .92);
      --dark: #050515;
      --white: #fffdf5;
      --green: #38ff9d;
      --muted: #b8c7ff;
      --shadow: 0 18px 45px rgba(0,0,0,.45);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; }
    body {
      font-family: Impact, Haettenschweiler, 'Arial Narrow Bold', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: var(--white);
      overflow-x: hidden;
      background:
        radial-gradient(circle at 50% 12%, rgba(255,255,255,.40), transparent 8%),
        radial-gradient(circle at 20% 20%, rgba(0,232,255,.42), transparent 23%),
        radial-gradient(circle at 80% 16%, rgba(255,216,90,.35), transparent 20%),
        conic-gradient(from 0deg at 50% 50%, #32006f, #ff2fa3, #061e88, #7b0fb6, #32006f);
      background-attachment: fixed;
    }

    body::before {
      content: '';
      position: fixed;
      inset: -20%;
      z-index: -3;
      background: repeating-conic-gradient(from 5deg at 50% 44%, rgba(255,255,255,.18) 0deg 5deg, rgba(255,255,255,0) 5deg 16deg);
      animation: rays 28s linear infinite;
      opacity: .75;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: -2;
      background:
        radial-gradient(circle at 50% 50%, transparent 0 45%, rgba(0,0,0,.34) 82%),
        linear-gradient(180deg, rgba(255,255,255,.08), rgba(0,0,0,.22));
      pointer-events: none;
    }

    @keyframes rays { to { transform: rotate(360deg); } }
    @keyframes pulse { 0%,100% { transform: scale(1); filter: brightness(1); } 50% { transform: scale(1.03); filter: brightness(1.24); } }
    @keyframes floaty { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes shake { 10%, 90% { transform: translate3d(-2px, 0, 0); } 20%, 80% { transform: translate3d(5px, 0, 0); } 30%, 50%, 70% { transform: translate3d(-8px, 0, 0); } 40%, 60% { transform: translate3d(8px, 0, 0); } }
    @keyframes logoSpinIn { 0% { transform: perspective(900px) translateZ(-900px) rotateY(-720deg) scale(.1); opacity: 0; filter: blur(12px) brightness(3); } 68% { transform: perspective(900px) translateZ(0) rotateY(20deg) scale(1.12); opacity: 1; filter: blur(0) brightness(1.8); } 82% { transform: perspective(900px) rotateY(-10deg) scale(.94); } 100% { transform: perspective(900px) rotateY(0deg) scale(1); opacity: 1; filter: brightness(1); } }
    @keyframes cardReveal { 0% { transform: rotateX(90deg) scale(.88); opacity: .1; filter: brightness(2.2); } 55% { transform: rotateX(-12deg) scale(1.05); opacity: 1; filter: brightness(1.8); } 100% { transform: rotateX(0) scale(1); opacity: 1; filter: brightness(1); } }
    @keyframes shine { 0% { transform: translateX(-130%) skewX(-20deg); } 100% { transform: translateX(160%) skewX(-20deg); } }
    @keyframes strikePop { 0% { transform: scale(.1) rotate(-18deg); opacity: 0; } 55% { transform: scale(1.25) rotate(7deg); opacity: 1; } 100% { transform: scale(1) rotate(0); opacity: 1; } }
    @keyframes blink { 0%,100% { opacity: .25; } 50% { opacity: 1; } }
    @keyframes dangerPulse { 0%,100% { box-shadow: 0 0 18px rgba(255,33,79,.45), inset 0 0 24px rgba(255,33,79,.25); } 50% { box-shadow: 0 0 55px rgba(255,33,79,.9), inset 0 0 36px rgba(255,33,79,.45); } }
    @keyframes timerPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }
    @keyframes confettiFall { 0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; } 100% { transform: translateY(110vh) rotate(720deg); opacity: .8; } }

    .app { min-height: 100vh; }
    .hidden { display: none !important; }
    .shake { animation: shake .55s cubic-bezier(.36,.07,.19,.97) both; }
    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .logo {
      position: relative;
      text-align: center;
      letter-spacing: .02em;
      line-height: .84;
      text-transform: uppercase;
      text-shadow:
        0 4px 0 #002366,
        0 8px 0 #00103c,
        0 15px 18px rgba(0,0,0,.7),
        0 0 24px rgba(255,255,255,.22);
      filter: drop-shadow(0 14px 16px rgba(0,0,0,.45));
    }

    .logo .num,
    .logo .dijeron { color: var(--gold); -webkit-text-stroke: 2px #072982; }
    .logo .papas { color: var(--cyan); -webkit-text-stroke: 2px #05246f; }
    .logo.big { font-size: clamp(4rem, 10vw, 10.5rem); }
    .logo.small { font-size: clamp(1.6rem, 3vw, 2.7rem); line-height: .82; }
    .logo::before {
      content: '';
      position: absolute;
      z-index: -1;
      left: 50%; top: 52%;
      width: 115%; height: 86%;
      transform: translate(-50%, -50%);
      border-radius: 50%;
      background: radial-gradient(ellipse, rgba(255,255,255,.25), rgba(255,46,234,.22) 47%, rgba(5,21,93,.75) 55%, rgba(255,216,90,.22) 62%, transparent 66%);
      border: 8px solid rgba(255,216,90,.7);
      box-shadow: inset 0 0 30px rgba(255,255,255,.24), 0 0 45px rgba(0,232,255,.42);
    }

    .logo .sparkle {
      position: absolute;
      width: .22em; height: .22em;
      border-radius: 50%;
      background: white;
      box-shadow: 0 0 14px 7px rgba(255,255,255,.72);
      animation: blink 1.15s ease-in-out infinite;
    }
    .logo .s1 { left: 9%; top: 18%; }
    .logo .s2 { right: 10%; top: 24%; animation-delay: .38s; }
    .logo .s3 { left: 47%; bottom: 2%; animation-delay: .7s; }

    /* GAME VIEW */
    .game-screen {
     height: 100vh;
      height: 100dvh;
      display: grid;
     grid-template-rows: minmax(74px, auto) minmax(0, 1fr) auto;
      gap: clamp(.35rem, .8vh, .75rem);
      padding: clamp(.35rem, .8vh, .7rem) 1.2vw;
      overflow: hidden;
    }

    .game-top {
      display: grid;
      grid-template-columns: minmax(190px, 1fr) minmax(260px, .9fr) minmax(190px, 1fr);
      align-items: center;
      gap: 1vw;
    }

    .score-card, .status-pill, .host-card, .fast-card {
      border: 3px solid rgba(255,216,90,.82);
      border-radius: 22px;
      background: linear-gradient(160deg, rgba(9,11,42,.92), rgba(39,8,92,.86));
      box-shadow: var(--shadow), inset 0 0 20px rgba(0,232,255,.12);
    }

    .score-card {
      padding: clamp(.45rem, 1vh, .8rem) 1rem;
      min-height: clamp(74px, 12vh, 100px);
      position: relative;
      overflow: hidden;
    }
    .score-card::after,
    .board::after,
    .answer-row::after {
      content: '';
      position: absolute;
      top: -20%; left: 0;
      width: 34%; height: 140%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      transform: translateX(-130%) skewX(-20deg);
      pointer-events: none;
    }
    .score-card.control {
      border-color: var(--green);
      box-shadow: 0 0 25px rgba(56,255,157,.55), inset 0 0 18px rgba(56,255,157,.15);
    }
    .score-card.control::after { animation: shine 1.1s ease; }
    .score-label { font-size: clamp(1rem, 1.5vw, 1.4rem); color: var(--muted); text-transform: uppercase; }
    .team-name { font-size: clamp(1.6rem, 2.7vw, 3rem); color: var(--gold); text-shadow: 0 3px 0 #4d1f00; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .team-score { font-size: clamp(2.4rem, 5vw, 5.2rem); color: white; text-shadow: 0 4px 0 #061c65; line-height: .9; }
    .control-badge { position: absolute; right: 14px; top: 10px; padding: .28rem .6rem; background: var(--green); color: #05152f; border-radius: 999px; font-size: .95rem; letter-spacing: .04em; display: none; }
    .score-card.control .control-badge { display: block; }

    .brand-block { text-align: center; }
    .subtitle { margin-top: clamp(.15rem, .5vh, .45rem); font-size: clamp(.78rem, 1.1vw, 1.1rem); color: #fff; letter-spacing: .08em; text-transform: uppercase; text-shadow: 0 2px 9px rgba(0,0,0,.65); }

    .game-mid {
      display: grid;
      grid-template-columns: minmax(180px, .75fr) minmax(560px, 2.35fr) minmax(180px, .75fr);
      gap: 1vw;
      align-items: stretch;
      min-height: 0;
    }

    .side-stack { display: flex; flex-direction: column; gap: clamp(.45rem, 1vh, .8rem); justify-content: center; min-height: 0; }
    .status-pill { padding: clamp(.45rem, 1vh, .7rem); text-align: center; }
    .status-pill .mini { color: var(--muted); font-size: clamp(.8rem, 1.1vw, 1rem); letter-spacing: .08em; text-transform: uppercase; }
    .status-pill .value { color: var(--gold); font-size: clamp(1.6rem, 3.2vw, 3.3rem); line-height: 1; text-shadow: 0 4px 0 #4a1b00; }
    .status-pill.bank .value { color: #fff; font-size: clamp(2.2rem, 4.8vw, 5rem); }

    .center-stage { display: flex; flex-direction: column; gap: clamp(.45rem, .9vh, .8rem); min-height: 0; }
    .question-box {
      position: relative;
      padding: clamp(.45rem, 1vh, .7rem) 1.2rem;
      border-radius: 24px;
      text-align: center;
      background: linear-gradient(180deg, rgba(4,16,78,.95), rgba(5,5,23,.96));
      border: 4px solid var(--fuchsia);
      box-shadow: 0 0 22px rgba(255,46,234,.55), inset 0 0 20px rgba(0,232,255,.18);
      color: white;
       font-size: clamp(1.1rem, 2.25vw, 2.55rem);
      text-shadow: 0 3px 0 #00193f;
      min-height: clamp(54px, 9vh, 76px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .board-shell {
      position: relative;
      flex: 1;
      min-height: 0;
      padding: clamp(12px, 1.8vh, 20px);
      border-radius: 34px;
      background: linear-gradient(135deg, #a6004e, #ff2eea 34%, #5e004f 65%, #ffb300);
      box-shadow: 0 18px 44px rgba(0,0,0,.58), 0 0 36px rgba(255,46,234,.55);
      overflow: hidden;
    }
    .bulbs {
      position: absolute;
      inset: 6px;
      border-radius: 30px;
      pointer-events: none;
      background:
        radial-gradient(circle, #fff7bd 0 4px, #ffb300 5px 8px, transparent 9px) top left / 42px 42px repeat-x,
        radial-gradient(circle, #fff7bd 0 4px, #ffb300 5px 8px, transparent 9px) bottom left / 42px 42px repeat-x,
        radial-gradient(circle, #fff7bd 0 4px, #ffb300 5px 8px, transparent 9px) top left / 42px 42px repeat-y,
        radial-gradient(circle, #fff7bd 0 4px, #ffb300 5px 8px, transparent 9px) top right / 42px 42px repeat-y;
      filter: drop-shadow(0 0 9px rgba(255,216,90,.85));
      animation: pulse 1.9s ease-in-out infinite;
    }
    .board {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      gap: clamp(.35rem, .8vh, .6rem);
      padding: clamp(2rem, 4.3vh, 2.6rem) clamp(.8rem, 1.3vw, 1.4rem) clamp(.65rem, 1.4vh, 1.2rem);
      background: radial-gradient(circle at 50% 20%, rgba(0,232,255,.16), transparent 35%), linear-gradient(180deg, #05091e, #010108);
      border: 6px solid #23003d;
      border-radius: 22px;
      overflow: hidden;
      box-shadow: inset 0 0 35px rgba(0,0,0,.85), inset 0 0 22px rgba(0,232,255,.14);
    }
    .board::before {
      content: 'RESPUESTAS';
      position: absolute;
      top: .55rem; left: 50%;
      transform: translateX(-50%);
      color: rgba(255,216,90,.92);
      letter-spacing: .18em;
      font-size: clamp(.8rem, 1vw, 1rem);
      text-shadow: 0 0 8px rgba(255,216,90,.8);
    }

    .answer-row {
      position: relative;
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      gap: .6rem;
      flex: 1 1 0;
      min-height: 0;
      padding: clamp(.32rem, .75vh, .5rem) .75rem;
      border-radius: 14px;
      border: 2px solid rgba(255,216,90,.46);
      background: linear-gradient(90deg, rgba(10,31,104,.95), rgba(6,13,55,.96));
      box-shadow: inset 0 -3px 0 rgba(0,0,0,.3), 0 4px 10px rgba(0,0,0,.34);
      overflow: hidden;
      transform-origin: center;
    }
    .answer-row.revealed {
      background: linear-gradient(90deg, #06266c, #07103d 70%, #431a00);
      border-color: var(--gold);
    }
    .answer-row.revealed.recent { animation: cardReveal .58s ease both; }
    .answer-row.revealed.recent::after { animation: shine .72s ease-out; }
    .answer-index {
      min-width: 40px;
      height: 40px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: radial-gradient(circle, #fff2a7, var(--gold2));
      color: #141036;
      font-size: clamp(1.2rem, 1.6vw, 1.6rem);
      text-shadow: none;
      box-shadow: 0 3px 0 #653000, 0 0 14px rgba(255,216,90,.58);
    }
    .answer-text {
      color: var(--gold);
      font-size: clamp(1.25rem, 2.25vw, 2.45rem);
      letter-spacing: .02em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 3px 0 #4e2100;
    }
    .answer-text.hidden-text { color: #d7ebff; text-shadow: 0 2px 0 #00173e; letter-spacing: .12em; }
    .dots { border-bottom: 4px dotted rgba(255,216,90,.42); align-self: center; height: 1px; display: none; }
    .answer-points {
      min-width: 66px;
      text-align: right;
      color: white;
      font-size: clamp(1.6rem, 2.7vw, 3rem);
      text-shadow: 0 3px 0 #04225e;
    }
    .answer-row:not(.revealed) .answer-points { opacity: 0; }

    .game-bottom {
      display: grid;
      grid-template-columns: 1fr minmax(300px, .8fr) 1fr;
      align-items: center;
      gap: 1rem;
    }
    .strikes {
      display: flex;
      justify-content: center;
      gap: clamp(.6rem, 1.1vw, 1.2rem);
    }
    .strike {
      width: clamp(52px, 6vw, 78px);
      height: clamp(52px, 6vw, 78px);
      border: 5px solid rgba(255,255,255,.25);
      border-radius: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,.18);
      background: rgba(0,0,0,.32);
      font-size: clamp(2.4rem, 5vw, 5rem);
      line-height: .8;
      text-shadow: none;
    }
    .strike.active {
      color: var(--red);
      border-color: var(--red);
      background: radial-gradient(circle, rgba(255,33,79,.36), rgba(30,0,12,.85));
      text-shadow: 0 0 24px rgba(255,33,79,.95), 0 5px 0 #61001a;
      animation: strikePop .35s ease both;
    }
    .message-banner {
      justify-self: center;
      max-width: 100%;
      padding: clamp(.4rem, .8vh, .6rem) 1.1rem;
      border-radius: 999px;
      background: rgba(5,5,23,.72);
      border: 3px solid rgba(255,216,90,.78);
      color: var(--gold);
      font-size: clamp(1.2rem, 2.1vw, 2.35rem);
      text-align: center;
      text-shadow: 0 3px 0 #4b1d00;
      box-shadow: 0 0 22px rgba(255,216,90,.24);
      min-height: 54px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .giant-overlay {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 50;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      background: radial-gradient(circle, rgba(255,255,255,.18), rgba(0,0,0,.42));
    }
    .giant-overlay.show { display: flex; }
    .giant-text {
      text-align: center;
      font-size: clamp(4rem, 13vw, 15rem);
      color: var(--red);
      -webkit-text-stroke: 4px white;
      text-shadow: 0 0 40px rgba(255,33,79,.8), 0 12px 0 #580018;
      animation: strikePop .5s ease both;
    }
    .giant-text.gold { color: var(--gold); -webkit-text-stroke: 4px #06277d; text-shadow: 0 0 40px rgba(255,216,90,.9), 0 12px 0 #4d1f00; }

    .intro-screen {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      text-align: center;
    }
    .intro-card {
      width: min(1050px, 94vw);
      padding: clamp(1.5rem, 4vw, 4rem);
      border-radius: 42px;
      background: radial-gradient(circle at 50% 12%, rgba(255,255,255,.24), transparent 25%), linear-gradient(160deg, rgba(15,2,79,.7), rgba(255,47,163,.18));
      border: 5px solid rgba(255,216,90,.78);
      box-shadow: 0 30px 80px rgba(0,0,0,.48), inset 0 0 36px rgba(255,255,255,.14);
    }
    .logo.spin-in { animation: logoSpinIn 1.9s cubic-bezier(.16,.84,.31,1.22) both; }
    .intro-help { margin-top: 2rem; font-family: system-ui, sans-serif; font-weight: 800; letter-spacing: .02em; color: #fff; text-shadow: 0 2px 8px rgba(0,0,0,.6); }
    .audio-unlock {
      position: fixed;
      right: 14px;
      top: 14px;
      z-index: 100;
      background: rgba(0,0,0,.65);
      color: #fff;
      border: 2px solid rgba(255,216,90,.8);
      border-radius: 999px;
      padding: .55rem .85rem;
      font-family: system-ui, sans-serif;
      font-weight: 800;
      font-size: .9rem;
      display: flex;
      gap: .45rem;
      align-items: center;
    }

    .victory-screen, .sudden-screen, .fast-screen {
      min-height: 100vh;
      padding: 2vh 2vw;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      text-align: center;
    }
    .victory-title, .sudden-title, .fast-title {
      font-size: clamp(4rem, 11vw, 13rem);
      line-height: .86;
      color: var(--gold);
      -webkit-text-stroke: 4px #051d72;
      text-shadow: 0 9px 0 #4d1f00, 0 0 45px rgba(255,255,255,.35);
      animation: pulse 1.4s ease-in-out infinite;
    }
    .victory-sub { font-size: clamp(2rem, 5vw, 6rem); color: var(--cyan); text-shadow: 0 6px 0 #00247c; }
    .winner-name { font-size: clamp(2.5rem, 7vw, 8rem); color: white; text-shadow: 0 6px 0 #5f005f; }
    .confetti-piece {
      position: fixed;
      top: -12vh;
      width: 12px;
      height: 18px;
      z-index: 40;
      opacity: .95;
      animation: confettiFall linear infinite;
    }

    .sudden-screen {
      background: radial-gradient(circle, rgba(255,33,79,.25), rgba(0,0,0,.2)), repeating-conic-gradient(from 0deg at 50% 50%, rgba(255,255,255,.1) 0 4deg, transparent 4deg 15deg);
    }
    .sudden-title { color: var(--red); -webkit-text-stroke: 4px white; animation: dangerPulse .8s ease-in-out infinite; padding: .3rem 1rem; border-radius: 25px; }
    .sudden .board-shell { animation: dangerPulse 1s ease-in-out infinite; }

    .fast-screen { justify-content: flex-start; padding-top: 2vh; }
    .fast-title { font-size: clamp(3rem, 7vw, 8rem); }
    .fast-grid {
      width: min(1200px, 96vw);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 1rem;
      align-items: start;
    }
    .fast-card { padding: 1rem; min-height: 150px; }
    .fast-card h3 { margin: 0 0 .6rem; color: var(--gold); font-size: clamp(1.4rem, 2vw, 2.2rem); }
    .fast-timer {
      font-size: clamp(5rem, 11vw, 12rem);
      color: white;
      text-shadow: 0 7px 0 #061c65, 0 0 24px rgba(255,255,255,.45);
      animation: timerPulse 1s ease-in-out infinite;
      line-height: .9;
    }
    .fast-table {
      width: min(1250px, 96vw);
      border-collapse: separate;
      border-spacing: 0 .55rem;
      font-size: clamp(1rem, 1.55vw, 1.7rem);
    }
    .fast-table th { color: var(--gold); text-shadow: 0 2px 0 #4d1f00; }
    .fast-table td, .fast-table th { padding: .55rem .8rem; background: rgba(5,5,23,.78); border-top: 2px solid rgba(255,216,90,.5); border-bottom: 2px solid rgba(255,216,90,.5); }
    .fast-table td:first-child, .fast-table th:first-child { border-left: 2px solid rgba(255,216,90,.5); border-radius: 12px 0 0 12px; text-align: left; }
    .fast-table td:last-child, .fast-table th:last-child { border-right: 2px solid rgba(255,216,90,.5); border-radius: 0 12px 12px 0; }
    .fast-total { font-size: clamp(2rem, 4vw, 5rem); color: var(--gold); text-shadow: 0 5px 0 #4d1f00; }
    .fast-result { font-size: clamp(1.8rem, 3vw, 4rem); color: white; text-shadow: 0 5px 0 #061c65; }

    /* HOST VIEW */
    .host-screen {
      min-height: 100vh;
      padding: 1rem;
      background: linear-gradient(135deg, #07071d, #190a3e 55%, #220026);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      color: #f8f7ff;
    }
    .host-header {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 1rem;
      align-items: center;
      padding: .85rem 1rem;
      border: 1px solid rgba(255,216,90,.25);
      border-radius: 18px;
      background: rgba(5,7,25,.92);
      box-shadow: 0 10px 30px rgba(0,0,0,.35);
      backdrop-filter: blur(12px);
    }

    const audioCache = {};

    function defaultRoundStates() {
      return rounds.map(r => ({ revealed: Array(r.answers.length).fill(false) }));
    }

    function defaultFastState() {
      return {
        winnerTeam: 1,
        player1: 'Jugador 1',

        activePlayer: 0,

      };
    }

    function defaultState() {
      return {
        version: 1,
        view: VIEW,
        mode: 'intro',
        currentRound: 0,
        roundStates: defaultRoundStates(),
        bank: 0,
        team1: { name: 'Familia 1', score: 0, members: ['', '', '', '', ''] },

        sudden: { revealed: Array(suddenDeath.answers.length).fill(false), winnerTeam: null },
        fast: defaultFastState()
      };
    }

    function normalizeState(raw) {
      const base = defaultState();
      const merged = { ...base, ...raw };
      merged.team1 = { ...base.team1, ...(raw.team1 || {}) };
      merged.team2 = { ...base.team2, ...(raw.team2 || {}) };
      merged.roundStates = Array.isArray(raw.roundStates) ? raw.roundStates : defaultRoundStates();
      if (merged.roundStates.length !== rounds.length) merged.roundStates = defaultRoundStates();
      merged.roundStates = merged.roundStates.map((rs, i) => ({ revealed: Array.isArray(rs.revealed) ? rs.revealed.slice(0, rounds[i].answers.length).concat(Array(Math.max(0, rounds[i].answers.length - rs.revealed.length)).fill(false)) : Array(rounds[i].answers.length).fill(false) }));
      merged.sudden = { ...base.sudden, ...(raw.sudden || {}) };
      if (!Array.isArray(merged.sudden.revealed) || merged.sudden.revealed.length !== suddenDeath.answers.length) merged.sudden.revealed = Array(suddenDeath.answers.length).fill(false);
      merged.fast = { ...base.fast, ...(raw.fast || {}) };
      merged.fast.rows = Array.isArray(merged.fast.rows) ? merged.fast.rows : defaultFastState().rows;
      merged.fast.rows = fastMoneyQuestions.map((_, i) => ({ ...defaultFastState().rows[i], ...(merged.fast.rows[i] || {}) }));
      merged.currentRound = clamp(parseInt(merged.currentRound, 10) || 0, 0, rounds.length - 1);
      merged.bank = Number(merged.bank) || 0;
      merged.strikes = clamp(parseInt(merged.strikes, 10) || 0, 0, 3);
      merged.team1.score = Number(merged.team1.score) || 0;
      merged.team2.score = Number(merged.team2.score) || 0;
      return merged;
    }

    function loadState() {
      try {
        const stored = localStorage.getItem(STORAGE_KEY);
        if (!stored) return defaultState();
        return normalizeState(JSON.parse(stored));
      } catch (err) {
        console.warn('No se pudo leer el estado, usando estado inicial.', err);
        return defaultState();
      }
    }

    function saveState(broadcast = true, remote = true) {
      state.view = VIEW;
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      if (broadcast && channel) channel.postMessage({ type: 'state', state });
    if (remote) sendRemoteState();
    }

    function setState(updater, options = {}) {
      const previous = structuredCloneSafe(state);
      updater(state);
      state = normalizeState(state);
      saveState(options.broadcast !== false, options.remote !== false);
      render(previous);
    }

    
    function remoteLabel() {
      if (!ROOM) return 'Local';
      if (!('Peer' in window)) return `Sala ${ROOM} · sin PeerJS`;
      return remoteReady ? `Sala ${ROOM} · conectado` : `Sala ${ROOM} · esperando conexión`;
    }

    function setupRemoteControl() {
      if (!ROOM || !('Peer' in window)) return;
      try {
        if (VIEW === 'game') {
          peer = new Peer(REMOTE_GAME_ID);
          peer.on('open', () => { remoteReady = remoteConnections.size > 0; render(); });
          peer.on('connection', conn => attachRemoteConnection(conn));
          peer.on('disconnected', () => { remoteReady = false; render(); });
          peer.on('error', err => console.warn('Control remoto no disponible:', err));
        } else {
          peer = new Peer();
          peer.on('open', () => {
            attachRemoteConnection(peer.connect(REMOTE_GAME_ID, { reliable: true }));
          });
          peer.on('error', err => { console.warn('Control remoto no disponible:', err); remoteReady = false; render(); });
        }
      } catch (err) {
        console.warn('No se pudo iniciar control remoto.', err);
      }
    }

    function attachRemoteConnection(conn) {
      if (!conn) return;
      remoteConnections.add(conn);
      conn.on('open', () => {
        remoteReady = true;
        if (VIEW === 'game') conn.send({ type: 'state', state });
        render();
      });
      conn.on('data', data => {
        if (!data || data.type !== 'state') return;
        const previous = structuredCloneSafe(state);
        state = normalizeState(data.state);
        saveState(false, false);
        render(previous);
      });
      conn.on('close', () => {
        remoteConnections.delete(conn);
        remoteReady = remoteConnections.size > 0;
        render();
      });
      conn.on('error', err => console.warn('Error de control remoto:', err));
    }

    function sendRemoteState() {
      if (!ROOM || !remoteConnections.size) return;
      const payload = { type: 'state', state };
      remoteConnections.forEach(conn => {
        if (conn.open) {
          try { conn.send(payload); } catch (err) { console.warn('No se pudo enviar estado remoto.', err); }
        }
      });

    function structuredCloneSafe(obj) {
      try { return structuredClone(obj); } catch { return JSON.parse(JSON.stringify(obj)); }

    function currentMultiplier() { return currentRound().multiplier; }
    function teamName(n) { return n === 1 ? state.team1.name : state.team2.name; }
    function totalFastPoints() { return state.fast.rows.reduce((sum, row) => sum + (Number(row.p1Points) || 0) + (Number(row.p2Points) || 0), 0); }
    function announce(text, type = 'normal') { state.message = { text, type, ts: Date.now() }; }
    function effect(type, extra = {}) { state.effect = { id: Date.now() + Math.random(), type, ...extra }; }

    function getAudio(name) {
     const sources = soundFiles[name];
      if (!sources) return null;
      if (!audioCache[name]) {
       const audio = new Audio();
        audio.preload = 'auto';
        audio.dataset.sourceIndex = '0';
        audio.src = sources[0];
        audio.addEventListener('error', () => {
          const current = Number(audio.dataset.sourceIndex) || 0;
          const next = current + 1;
          if (next >= sources.length) return;
          audio.dataset.sourceIndex = String(next);
          audio.src = sources[next];
          try { audio.load(); } catch {}
        });
        audioCache[name] = audio;
      }
      return audioCache[name];
    }

    async function unlockAudio() {
      audioUnlocked = true;
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') await audioCtx.resume();
      } catch {}
      for (const key of Object.keys(soundFiles)) {
        const audio = getAudio(key);
        if (!audio) continue;
        try { audio.load(); } catch {}
      }
      render();
    }

    function playSound(name) {
      if (state.mute) return;
      if (name === 'repeat') return beepRepeat();
      if (name === 'suspense') return beepSuspense();
      const audio = getAudio(name);
      if (!audio) return;
      try {
        audio.currentTime = 0;
        const p = audio.play();
        if (p && p.catch) p.catch(() => {});
      } catch {}
    }

    function beep(freq = 440, duration = 120, type = 'sine', gainValue = .16, delay = 0) {
      if (state.mute) return;
      try {
        audioCtx = audioCtx || new (window.AudioContext || window.webkitAudioContext)();
        const start = audioCtx.currentTime + delay;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, start);
        gain.gain.setValueAtTime(0.0001, start);
        gain.gain.exponentialRampToValueAtTime(gainValue, start + .015);
        gain.gain.exponentialRampToValueAtTime(0.0001, start + duration / 1000);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(start);
        osc.stop(start + duration / 1000 + .02);
      } catch {}
    }

    function beepRepeat() {
      beep(760, 100, 'square', .13, 0);
      beep(760, 100, 'square', .13, .16);
    }

    function beepSuspense() {
      beep(105, 650, 'sawtooth', .12, 0);
      beep(82, 850, 'sine', .10, .35);
    }

    function runEffect(previous) {
      if (!state.effect || state.effect.id === lastEffectId) return;
      lastEffectId = state.effect.id;
      const type = state.effect.type;
      if (type === 'start') playSound('start');
      if (type === 'correct') playSound('correct');
      if (type === 'incorrect' || type === 'strike') playSound('incorrect');
      if (type === 'repeat') playSound('repeat');
      if (type === 'suspense') playSound('suspense');
      if (type === 'victory') playSound('victory');

      if (VIEW === 'game') {
        const root = document.querySelector('.game-screen, .sudden-screen, .fast-screen');
        if ((type === 'incorrect' || type === 'strike') && root) {
          root.classList.remove('shake');
          void root.offsetWidth;
          root.classList.add('shake');
        }
        if (type === 'strike') showGiant('✕', 'red', 950);
        if (type === 'steal') showGiant('¡ROBO!', 'gold', 1200);
        if (type === 'correct') highlightRecentAnswer(state.effect.answerIndex);
      }
    }

    function showGiant(text, color = 'red', duration = 900) {
      let overlay = document.getElementById('giant-overlay');
      if (!overlay) return;
      overlay.innerHTML = `<div class="giant-text ${color === 'gold' ? 'gold' : ''}">${esc(text)}</div>`;
      overlay.classList.add('show');
      clearTimeout(showGiant._t);
      showGiant._t = setTimeout(() => overlay.classList.remove('show'), duration);
    }

    function highlightRecentAnswer(index) {
      if (index == null) return;
      const row = document.querySelector(`[data-answer-index="${index}"]`);
      if (!row) return;
      row.classList.add('recent');
      setTimeout(() => row.classList.remove('recent'), 900);
    }

    /* Actions */
    const actions = {
      startShow() {
        setState(s => {
          s.mode = 'game';
          s.currentRound = s.currentRound || 0;
          announce('¡A jugar!');
          effect('start');
        });
      },
      resetGame() {
        if (!confirm('¿Seguro que quieres reiniciar TODO el juego? Se borran puntos, rondas, strikes y dinero rápido.')) return;
        state = defaultState();
        saveState(true);
        render();
      },
      resetRound() {
        setState(s => {
          s.roundStates[s.currentRound].revealed = Array(currentRound().answers.length).fill(false);
          s.bank = 0;
          s.strikes = 0;
          s.mode = 'game';
          announce('Ronda reiniciada');
        });
      },
      nextRound() {
        setState(s => {
          s.currentRound = clamp(s.currentRound + 1, 0, rounds.length - 1);
          s.bank = 0;
          s.strikes = 0;
          s.mode = 'game';
          announce(`Ronda ${s.currentRound + 1}`);
        });
      },
      prevRound() {
        setState(s => {
          s.currentRound = clamp(s.currentRound - 1, 0, rounds.length - 1);
          s.bank = 0;
          s.strikes = 0;
          s.mode = 'game';
          announce(`Ronda ${s.currentRound + 1}`);
        });
      },
      setRound(index) {
        setState(s => {
          s.currentRound = clamp(index, 0, rounds.length - 1);
          s.bank = 0;
          s.strikes = 0;
          s.mode = 'game';
          announce(`Ronda ${s.currentRound + 1}`);
        });
      },
      reveal(index) {
        setState(s => {
          const round = rounds[s.currentRound];
          if (!s.roundStates[s.currentRound].revealed[index]) {
            s.roundStates[s.currentRound].revealed[index] = true;
            s.bank += round.answers[index][1];
            announce(`¡${round.answers[index][0]}!`);
            effect('correct', { answerIndex: index });
          }
        });
      },
      hide(index) {
        setState(s => {
          const round = rounds[s.currentRound];
          if (s.roundStates[s.currentRound].revealed[index]) {
            s.roundStates[s.currentRound].revealed[index] = false;
            s.bank = Math.max(0, s.bank - round.answers[index][1]);
            announce('Respuesta oculta');
          }
        });
      },
      revealAll() {
        setState(s => {
          const r = rounds[s.currentRound];
          const rev = s.roundStates[s.currentRound].revealed;
          r.answers.forEach((a, i) => { if (!rev[i]) { rev[i] = true; s.bank += a[1]; } });
          announce('Todas las respuestas reveladas');
          effect('correct');
        });
      },
      hideAll() {
        setState(s => {
          s.roundStates[s.currentRound].revealed = Array(rounds[s.currentRound].answers.length).fill(false);
          s.bank = 0;
          announce('Todas las respuestas ocultas');
        });
      },
      addStrike() {
        setState(s => {
          s.strikes = clamp(s.strikes + 1, 0, 3);
          if (s.strikes >= 3) {
            s.mode = 'steal';
            announce('¡OPORTUNIDAD DE ROBO!', 'steal');
            effect('steal');
          } else {
            announce('¡STRIKE!', 'strike');
            effect('strike');
          }
        });
      },
      removeStrike() {
        setState(s => { s.strikes = clamp(s.strikes - 1, 0, 3); announce('Strike corregido'); });
      },
      clearStrikes() {
        setState(s => { s.strikes = 0; announce('Strikes limpios'); });
      },
      setControl(team) {
        setState(s => { s.controlTeam = team; announce(`${teamName(team)} tiene el control`); });
      },
      setTeamName(team, name) {
        setState(s => { s[`team${team}`].name = name.trim() || `Familia ${team}`; });
      },
      setTeamScore(team, score) {
        setState(s => { s[`team${team}`].score = Number(score) || 0; checkWinner(s); });
      },
      setBank(bank) { setState(s => { s.bank = Number(bank) || 0; }); },
      assignBank(team, customMessage) {
        setState(s => {
          const points = s.bank * rounds[s.currentRound].multiplier;
          s[`team${team}`].score += points;
          announce(customMessage || `${teamName(team)} recibe ${points} puntos`);
          s.bank = 0;
          s.strikes = 0;
          s.mode = 'game';
          effect('correct');
          checkWinner(s);
        });
      },
      activateSteal() {
        setState(s => { s.mode = 'steal'; announce('¡OPORTUNIDAD DE ROBO!', 'steal'); effect('steal'); });
      },
      stealSuccess(team) {
        actions.assignBank(team, `¡ROBO EXITOSO! ${teamName(team)} se lleva el banco`);
      },
      stealFailed() {
        const team = state.controlTeam || 1;
        actions.assignBank(team, `¡ROBO FALLIDO! ${teamName(team)} conserva el banco`);
      },
      activateSudden() {
        setState(s => {
          s.mode = 'sudden';
          s.sudden.revealed = Array(suddenDeath.answers.length).fill(false);
          announce('MUERTE SÚBITA');
          effect('suspense');
        });
      },
      revealSudden(index) {
        setState(s => {
          s.sudden.revealed = s.sudden.revealed.map((v, i) => i === index ? true : v);
          announce(`Muerte súbita: ${suddenDeath.answers[index][0]}`);
          effect(index === 0 ? 'victory' : 'correct', { answerIndex: index });
        });
      },
      suddenWinner(team) {
        setState(s => {
          s.winnerTeam = team;
          s.mode = 'victory';
          announce(`¡FAMILIA GANADORA! ${teamName(team)}`);
          effect('victory');
        });
      },
      activateFast() {
        setState(s => { s.mode = 'fast'; s.fast.timerRunning = false; s.fast.timer = 0; s.fast.resultShown = false; announce('DINERO RÁPIDO'); effect('start'); });
      },
      activateVictory(team = state.team1.score >= state.team2.score ? 1 : 2) {
        setState(s => { s.winnerTeam = team; s.mode = 'victory'; announce(`¡FAMILIA GANADORA! ${teamName(team)}`); effect('victory'); });
      },
      backToGame() { setState(s => { s.mode = 'game'; announce(`Ronda ${s.currentRound + 1}`); }); },
      toggleMute() { setState(s => { s.mute = !s.mute; announce(s.mute ? 'Audio silenciado' : 'Audio activo'); }); },
      playSoundButton(name) {
        setState(s => { effect(name); if (name === 'repeat') announce('Respuesta repetida, intenta otra'); });
      },
      randomPhrase() {
        setState(s => { s.hostPhrase = hostPhrases[Math.floor(Math.random() * hostPhrases.length)]; });
      },
      updateMember(team, idx, value) {
        setState(s => { s[`team${team}`].members[idx] = value; });
      },
      setFastField(field, value) {
        setState(s => { s.fast[field] = value; });
      },
      setFastRow(i, field, value) {
        setState(s => {
          const row = s.fast.rows[i];
          row[field] = field.includes('Points') ? Number(value) || 0 : value;
          const p1 = normalizeAnswer(row.p1Answer);
          const p2 = normalizeAnswer(row.p2Answer);
          row.repeated = !!p1 && !!p2 && p1 === p2;
          if (row.repeated && field === 'p2Answer') {
            announce('Respuesta repetida, intenta otra');
            effect('repeat');
          }
        });
      },
      startFastTimer(player) {
        const seconds = player === 1 ? 15 : 20;
        setState(s => { s.fast.activePlayer = player; s.fast.timer = seconds; s.fast.timerRunning = true; s.fast.resultShown = false; announce(`${player === 1 ? s.fast.player1 : s.fast.player2}: ${seconds} segundos`); effect('suspense'); });
        startLocalTimer();
      },
      stopFastTimer() {
        setState(s => { s.fast.timerRunning = false; announce('Tiempo detenido'); });
        clearInterval(timerInterval);
      },
      showFastResult() {
        setState(s => {
          s.fast.resultShown = true;
          const total = totalFastPoints();
          announce(total >= 200 ? '¡GANARON EL BONO DE $100,000 MXN!' : 'Se quedaron cerca, pero papá estaría orgulloso… más o menos.');
          effect(total >= 200 ? 'victory' : 'incorrect');
        });
      },
      requestFullscreen() {
        const el = document.documentElement;
        if (!document.fullscreenElement && el.requestFullscreen) el.requestFullscreen().catch(() => {});
      }
    };

    function checkWinner(s) {
      if (s.team1.score >= 300) {
        s.winnerTeam = 1;
        s.mode = 'victory';
        announce(`¡FAMILIA GANADORA! ${s.team1.name}`);
        effect('victory');
      } else if (s.team2.score >= 300) {
        s.winnerTeam = 2;
        s.mode = 'victory';
        announce(`¡FAMILIA GANADORA! ${s.team2.name}`);
        effect('victory');
      }
    }

    function normalizeAnswer(str) {
      return String(str || '').normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase().replace(/[^a-z0-9ñ]/g, '').trim();
    }

    function startLocalTimer() {
      clearInterval(timerInterval);
      timerInterval = setInterval(() => {
        if (!state.fast.timerRunning) return clearInterval(timerInterval);
        setState(s => {
          s.fast.timer = Math.max(0, Number(s.fast.timer) - 1);
          if (s.fast.timer <= 0) {
            s.fast.timerRunning = false;
            announce('¡Tiempo!');
            effect('incorrect');
          }
        });
        if (state.fast.timer <= 0) clearInterval(timerInterval);
      }, 1000);
    }

    /* Rendering */
    function render(previous) {
      if (VIEW === 'host') renderHost();
      else renderGame();
      bindCommon();
      runEffect(previous);
      if (VIEW === 'game' && state.mode === 'victory') createConfetti();
    }

    function logoHTML(size = 'small', spin = false) {
      return `<div class="logo ${size} ${spin ? 'spin-in' : ''}">
        <span class="sparkle s1"></span><span class="sparkle s2"></span><span class="sparkle s3"></span>
        <div class="num">100</div><div class="papas">PAPÁS</div><div class="dijeron">DIJERON</div>
      </div>`;
    }

    function renderGame() {
      const audioButton = audioUnlocked ? '' : `<button class="audio-unlock" data-action="unlockAudio">🔊 Habilitar audio / pantalla completa</button>`;
      if (state.mode === 'intro') {
        $app.innerHTML = `${audioButton}<main class="intro-screen">
          <section class="intro-card">
            ${logoHTML('big')}
            <div class="intro-help">Abre el panel del conductor en <b>index.html?view=host</b> y presiona <b>INICIAR SHOW</b>.<br>Para celular: usa la misma sala en ambos equipos, por ejemplo <b>?view=game&room=fiesta</b> en la computadora y <b>?view=host&room=fiesta</b> en el celular.</div>
          </section>
        </main>`;
        return;
      }
      if (state.mode === 'victory') { renderVictory(audioButton); return; }
      if (state.mode === 'sudden') { renderSudden(audioButton); return; }
      if (state.mode === 'fast') { renderFast(audioButton); return; }
      renderMainGame(audioButton);
    }

    function renderMainGame(audioButton) {
      const r = currentRound();
      const rev = currentRevealed();
      const spin = state.effect?.type === 'start';
      $app.innerHTML = `${audioButton}<main class="game-screen">
        <section class="game-top">
          ${scoreCard(1)}
          <div class="brand-block">${logoHTML('small', spin)}<div class="subtitle">Edición Día del Padre · Familia Mexicana</div></div>
          ${scoreCard(2)}
        </section>
        <section class="game-mid">
          <aside class="side-stack">
            <div class="status-pill"><div class="mini">Ronda</div><div class="value">${state.currentRound + 1}/9</div></div>
            <div class="status-pill"><div class="mini">Multiplicador</div><div class="value">x${r.multiplier}</div></div>
          </aside>
          <section class="center-stage">
            <div class="question-box">${esc(r.question)}</div>
            ${boardHTML(r, rev)}
          </section>
          <aside class="side-stack">
            <div class="status-pill bank"><div class="mini">Banco</div><div class="value">${state.bank}</div></div>
            <div class="status-pill"><div class="mini">Modo</div><div class="value" style="font-size:clamp(1.4rem,2.6vw,3rem)">${state.mode === 'steal' ? 'ROBO' : 'JUEGO'}</div></div>
          </aside>
        </section>
        <section class="game-bottom">
          <div></div>
          ${strikesHTML()}
          <div class="message-banner">${esc(state.message?.text || '')}</div>
        </section>
      </main><div id="giant-overlay" class="giant-overlay"></div>`;
    }

    function scoreCard(team) {
      const t = state[`team${team}`];
      const control = state.controlTeam === team;
      return `<div class="score-card ${control ? 'control' : ''}">
        <div class="control-badge">CONTROL</div>
        <div class="score-label">Equipo ${team}</div>
        <div class="team-name">${esc(t.name)}</div>
        <div class="team-score">${t.score}</div>
      </div>`;
    }

    function boardHTML(round, revealed) {
      return `<div class="board-shell"><div class="bulbs"></div><div class="board">
        ${round.answers.map(([text, points], i) => {
          const isRevealed = !!revealed[i];
          return `<div class="answer-row ${isRevealed ? 'revealed' : ''}" data-answer-index="${i}">
            <div class="answer-index">${i + 1}</div>
            <div class="answer-text ${isRevealed ? '' : 'hidden-text'}">${isRevealed ? esc(text) : '????????'}</div>
            <div class="answer-points">${points}</div>
          </div>`;
        }).join('')}
      </div></div>`;
    }

    function strikesHTML() {
      return `<div class="strikes">${[0,1,2].map(i => `<div class="strike ${state.strikes > i ? 'active' : ''}">X</div>`).join('')}</div>`;
    }

    function renderSudden(audioButton) {
      $app.innerHTML = `${audioButton}<main class="sudden-screen sudden">
        <div class="sudden-title">MUERTE SÚBITA</div>
        <div class="question-box" style="width:min(1050px,96vw)">${esc(suddenDeath.question)}</div>
        <div style="width:min(1050px,96vw)">${boardHTML(suddenDeath, state.sudden.revealed)}</div>
        <div class="message-banner">${esc(state.message?.text || 'Solo importa encontrar la respuesta número 1')}</div>
      </main><div id="giant-overlay" class="giant-overlay"></div>`;
    }

    function renderVictory(audioButton) {
      const winner = state.winnerTeam || (state.team1.score >= state.team2.score ? 1 : 2);
      $app.innerHTML = `${audioButton}<main class="victory-screen">
        <div class="victory-title">¡FAMILIA GANADORA!</div>
        <div class="winner-name">${esc(teamName(winner))}</div>
        <div class="victory-sub">Pasan a DINERO RÁPIDO</div>
        <div class="message-banner">${esc(state.message?.text || '¡Aplausos, gritos y carrilla!')}</div>
      </main><div id="confetti"></div><div id="giant-overlay" class="giant-overlay"></div>`;
    }

    function renderFast(audioButton) {
      const total = totalFastPoints();
      const result = total >= 200 ? '¡GANARON EL BONO DE $100,000 MXN!' : 'Se quedaron cerca, pero papá estaría orgulloso… más o menos.';
      $app.innerHTML = `${audioButton}<main class="fast-screen">
        <div class="fast-title">DINERO RÁPIDO</div>
        <div class="fast-grid">
          <div class="fast-card"><h3>Equipo ganador</h3><div class="team-name">${esc(teamName(state.fast.winnerTeam))}</div></div>
          <div class="fast-card"><h3>Temporizador</h3><div class="fast-timer">${state.fast.timer}</div><div>${state.fast.activePlayer ? esc(state.fast.activePlayer === 1 ? state.fast.player1 : state.fast.player2) : 'Listos'}</div></div>
          <div class="fast-card"><h3>Total combinado</h3><div class="fast-total">${total}</div></div>
        </div>
        <table class="fast-table">
          <thead><tr><th>Pregunta</th><th>${esc(state.fast.player1)}</th><th>Pts</th><th>${esc(state.fast.player2)}</th><th>Pts</th></tr></thead>
          <tbody>${fastMoneyQuestions.map((q, i) => {
            const row = state.fast.rows[i];
            return `<tr>
              <td>${i + 1}. ${esc(q.q)}</td>
              <td>${esc(row.p1Answer || '—')}</td><td>${row.p1Points || 0}</td>
              <td>${esc(row.p2Answer || '—')}${row.repeated ? ' ⚠️ repetida' : ''}</td><td>${row.p2Points || 0}</td>
            </tr>`;
          }).join('')}</tbody>
        </table>
        <div class="fast-result">${state.fast.resultShown ? esc(result) : esc(state.message?.text || 'Esperando respuestas...')}</div>
      </main><div id="giant-overlay" class="giant-overlay"></div>`;
    }

    function createConfetti() {
      const holder = document.getElementById('confetti');
      if (!holder || holder.dataset.ready) return;
      holder.dataset.ready = '1';
      const colors = ['#ffd85a', '#00e8ff', '#ff2fa3', '#ffffff', '#38ff9d', '#ff214f'];
      for (let i = 0; i < 85; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = Math.random() * 100 + 'vw';
        piece.style.background = colors[i % colors.length];
        piece.style.animationDuration = (2.8 + Math.random() * 3.2) + 's';
        piece.style.animationDelay = (Math.random() * 2.2) + 's';
        piece.style.transform = `rotate(${Math.random() * 360}deg)`;
        holder.appendChild(piece);
      }
    }

    function renderHost() {
      const r = currentRound();
      const rev = currentRevealed();
      const totalFast = totalFastPoints();
      $app.innerHTML = `<main class="host-screen">
        <header class="host-header">
          <div>
            <h1 class="host-title"><span>100 PAPÁS DIJERON</span> · Panel del conductor</h1>

          </div>
          <div class="host-row" style="justify-content:flex-end">
            <button class="btn primary" data-action="startShow">INICIAR SHOW</button>
            <button class="btn cyan" data-action="requestFullscreen">Pantalla completa</button>
            <button class="btn ${state.mute ? 'red' : 'dark'}" data-action="toggleMute">${state.mute ? 'MUTE ON' : 'Mute'}</button>
          </div>
        </header>

        <section class="host-layout">
          <aside>
            ${hostStatusHTML()}
            ${teamConfigHTML()}
            ${soundPanelHTML()}
            ${phrasesHTML()}
          </aside>

          <section>
            <div class="host-card">
              <h2>Ronda actual</h2>
              <div class="host-question">${esc(r.question)}</div>
              <div class="host-row">
                <button class="btn dark" data-action="prevRound">← Ronda anterior</button>
                <select class="select" style="max-width:190px" data-change="setRound">
                  ${rounds.map((_, i) => `<option value="${i}" ${i === state.currentRound ? 'selected' : ''}>Ronda ${i + 1} · x${rounds[i].multiplier}</option>`).join('')}
                </select>
                <button class="btn dark" data-action="nextRound">Siguiente ronda →</button>
              </div>
              <div class="host-row">
                <button class="btn red" data-action="resetRound">Reiniciar ronda</button>
                <button class="btn green" data-action="revealAll">Revelar todas</button>
                <button class="btn dark" data-action="hideAll">Ocultar todas</button>
              </div>
            </div>

            <div class="host-card">
              <h2>Respuestas visibles para conductor</h2>
              ${r.answers.map(([text, points], i) => `<div class="answer-control ${rev[i] ? 'revealed' : ''}">
                <div class="idx">${i + 1}</div>
                <div class="answer-main"><div class="text">${esc(text)}</div><div class="pts">${points} pts · <span class="tag ${rev[i] ? 'ok' : 'warn'}">${rev[i] ? 'Revelada' : 'Oculta'}</span></div></div>
                <button class="btn ${rev[i] ? 'dark' : 'primary'}" data-action="${rev[i] ? 'hide' : 'reveal'}" data-index="${i}">${rev[i] ? 'Ocultar' : 'Revelar'}</button>
              </div>`).join('')}
            </div>

            ${state.mode === 'sudden' ? suddenHostHTML() : ''}
            ${state.mode === 'fast' ? fastHostHTML(totalFast) : ''}
          </section>

          <aside>
            ${mainControlsHTML()}
            ${scoreEditHTML()}
            ${modeControlsHTML()}
            <div class="host-card danger-zone">
              <h2>Zona peligrosa</h2>
              <button class="btn red full" data-action="resetGame">Reiniciar juego completo</button>
              <p class="muted-note">Usa esto solo antes de empezar otro juego. Borra puntajes, banco, strikes, dinero rápido y reveladas.</p>
            </div>
          </aside>
        </section>
      </main>`;
    }

    function hostStatusHTML() {
      return `<div class="host-card">
        <h2>Estado</h2>
        <div class="stat-grid">
          <div class="stat"><div class="label">Modo</div><div class="num gold">${esc(state.mode).toUpperCase()}</div></div>
          <div class="stat"><div class="label">Ronda</div><div class="num">${state.currentRound + 1}/9</div></div>
          <div class="stat"><div class="label">Multiplicador</div><div class="num gold">x${currentMultiplier()}</div></div>
          <div class="stat"><div class="label">Banco</div><div class="num">${state.bank}</div></div>
          <div class="stat"><div class="label">Strikes</div><div class="num">${'X'.repeat(state.strikes) || '0'}</div></div>
          <div class="stat"><div class="label">Control</div><div class="num small">${esc(teamName(state.controlTeam || 1))}</div></div>
        </div>
        <div class="host-row"><span class="tag ${state.mute ? 'danger' : 'ok'}">${state.mute ? 'Silenciado' : 'Audio activo'}</span><span class="tag warn">Banco x${currentMultiplier()} = ${state.bank * currentMultiplier()}</span></div>
      </div>`;
    }

    function teamConfigHTML() {
      return `<div class="host-card">
        <h2>Equipos</h2>
        ${[1,2].map(team => `<div style="margin-bottom:1rem">
          <div class="field"><label>Nombre equipo ${team}</label><input class="input" value="${esc(state[`team${team}`].name)}" data-blur="setTeamName" data-team="${team}" /></div>
          <div class="host-grid-2">
            ${[0,1,2,3,4].map(i => `<div class="field"><label>Concursante ${i + 1}</label><input class="input" value="${esc(state[`team${team}`].members[i] || '')}" data-blur="updateMember" data-team="${team}" data-index="${i}" /></div>`).join('')}
          </div>
        </div>`).join('')}
      </div>`;
    }

    function soundPanelHTML() {
      return `<div class="host-card">
        <h2>Sonidos</h2>
        <div class="host-grid-2">
          <button class="btn primary" data-sound="start">A jugar</button>
          <button class="btn green" data-sound="correct">Correcta</button>
          <button class="btn red" data-sound="incorrect">Incorrecta</button>
          <button class="btn dark" data-sound="repeat">Repetida</button>
          <button class="btn purple" data-sound="suspense">Suspenso</button>
          <button class="btn primary" data-sound="victory">Victoria</button>
        </div>
      </div>`;
    }

    function phrasesHTML() {
      return `<div class="host-card">
        <h2>Frases para conductor</h2>
        <div class="phrase-box">${esc(state.hostPhrase)}</div>
        <div class="host-row"><button class="btn cyan" data-action="randomPhrase">Dame frase</button></div>
      </div>`;
    }

    function mainControlsHTML() {
      return `<div class="host-card">
        <h2>Control rápido</h2>
        <div class="host-grid-2">
          <button class="btn red" data-action="addStrike">Agregar strike</button>
          <button class="btn dark" data-action="removeStrike">Quitar strike</button>
          <button class="btn dark" data-action="clearStrikes">Limpiar strikes</button>
          <button class="btn purple" data-action="activateSteal">Activar robo</button>
          <button class="btn cyan" data-action="setControl" data-team="1">Control Equipo 1</button>
          <button class="btn cyan" data-action="setControl" data-team="2">Control Equipo 2</button>
          <button class="btn green" data-action="assignBank" data-team="1">Banco a Equipo 1</button>
          <button class="btn green" data-action="assignBank" data-team="2">Banco a Equipo 2</button>
          <button class="btn primary" data-action="stealSuccess" data-team="1">Robo exitoso E1</button>
          <button class="btn primary" data-action="stealSuccess" data-team="2">Robo exitoso E2</button>
          <button class="btn red" data-action="stealFailed">Robo fallido</button>
          <button class="btn dark" data-action="backToGame">Volver al juego</button>
        </div>
      </div>`;
    }

    function scoreEditHTML() {
      return `<div class="host-card">
        <h2>Edición manual</h2>
        <div class="host-grid-2">
          <div class="field"><label>Puntaje Equipo 1</label><input type="number" class="input" value="${state.team1.score}" data-blur="setTeamScore" data-team="1" /></div>
          <div class="field"><label>Puntaje Equipo 2</label><input type="number" class="input" value="${state.team2.score}" data-blur="setTeamScore" data-team="2" /></div>
        </div>
        <div class="field"><label>Banco</label><input type="number" class="input" value="${state.bank}" data-blur="setBank" /></div>
      </div>`;
    }

    function modeControlsHTML() {
      return `<div class="host-card">
        <h2>Modos especiales</h2>
        <div class="host-grid-2">
          <button class="btn red" data-action="activateSudden">Activar Muerte Súbita</button>
          <button class="btn purple" data-action="activateFast">Activar Dinero Rápido</button>
          <button class="btn primary" data-action="activateVictory" data-team="1">Victoria E1</button>
          <button class="btn primary" data-action="activateVictory" data-team="2">Victoria E2</button>
        </div>
        <p class="muted-note">Victoria automática: la primera familia en llegar a 300 puntos pasa a Dinero Rápido.</p>
      </div>`;
    }

    function suddenHostHTML() {
      return `<div class="host-card danger-zone">
        <h2>Muerte Súbita</h2>
        <div class="host-question">${esc(suddenDeath.question)}</div>
        ${suddenDeath.answers.map(([text, points], i) => `<div class="answer-control ${state.sudden.revealed[i] ? 'revealed' : ''}">
          <div class="idx">${i + 1}</div><div class="answer-main"><div class="text">${esc(text)}</div><div class="pts">${points} pts</div></div>
          <button class="btn ${i === 0 ? 'primary' : 'dark'}" data-action="revealSudden" data-index="${i}">Revelar ${i + 1}</button>
        </div>`).join('')}
        <div class="host-grid-2">
          <button class="btn primary" data-action="suddenWinner" data-team="1">Gana Equipo 1</button>
          <button class="btn primary" data-action="suddenWinner" data-team="2">Gana Equipo 2</button>
        </div>
      </div>`;
    }

    function fastHostHTML(totalFast) {
      return `<div class="host-card">
        <h2>Dinero Rápido</h2>
        <div class="host-grid-2">
          <div class="field"><label>Equipo ganador</label><select class="select" data-change="fastWinner"><option value="1" ${state.fast.winnerTeam == 1 ? 'selected' : ''}>${esc(state.team1.name)}</option><option value="2" ${state.fast.winnerTeam == 2 ? 'selected' : ''}>${esc(state.team2.name)}</option></select></div>
          <div class="stat"><div class="label">Total</div><div class="num gold">${totalFast}</div></div>
          <div class="field"><label>Jugador 1</label><input class="input" value="${esc(state.fast.player1)}" data-blur="fastField" data-field="player1" /></div>
          <div class="field"><label>Jugador 2</label><input class="input" value="${esc(state.fast.player2)}" data-blur="fastField" data-field="player2" /></div>
        </div>
        <div class="host-row">
          <button class="btn cyan" data-action="startFastTimer" data-player="1">Timer Jugador 1 · 15s</button>
          <button class="btn purple" data-action="startFastTimer" data-player="2">Timer Jugador 2 · 20s</button>
          <button class="btn red" data-action="stopFastTimer">Detener</button>
          <button class="btn primary" data-action="showFastResult">Mostrar resultado</button>
        </div>
        <div class="host-question">Tiempo: ${state.fast.timer}s · Activo: ${state.fast.activePlayer ? (state.fast.activePlayer === 1 ? esc(state.fast.player1) : esc(state.fast.player2)) : 'ninguno'}</div>
        ${fastMoneyQuestions.map((q, i) => {
          const row = state.fast.rows[i];
          return `<div class="fast-host-row">
            <div class="q">${i + 1}. ${esc(q.q)}<br><span class="muted-note">Sugeridas: ${q.a.map(a => `${a[0]} ${a[1]}`).join(' · ')}</span></div>
            <input class="input" placeholder="Respuesta J1" value="${esc(row.p1Answer)}" data-blur="fastRow" data-index="${i}" data-field="p1Answer" />
            <input type="number" class="input" value="${row.p1Points}" data-blur="fastRow" data-index="${i}" data-field="p1Points" />
            <input class="input" placeholder="Respuesta J2" value="${esc(row.p2Answer)}" data-blur="fastRow" data-index="${i}" data-field="p2Answer" />
            <input type="number" class="input" value="${row.p2Points}" data-blur="fastRow" data-index="${i}" data-field="p2Points" />
          </div>`;
        }).join('')}
      </div>`;
    }

    function bindCommon() {
      document.querySelectorAll('[data-action]').forEach(btn => {
        btn.addEventListener('click', ev => {
          const action = btn.dataset.action;
          if (action === 'unlockAudio') { unlockAudio(); actions.requestFullscreen(); return; }
          const idx = btn.dataset.index != null ? Number(btn.dataset.index) : undefined;
          const team = btn.dataset.team != null ? Number(btn.dataset.team) : undefined;
          const player = btn.dataset.player != null ? Number(btn.dataset.player) : undefined;
          if (['reveal', 'hide', 'revealSudden'].includes(action)) return actions[action](idx);
          if (['setControl', 'assignBank', 'stealSuccess', 'suddenWinner', 'activateVictory'].includes(action)) return actions[action](team);
          if (['startFastTimer'].includes(action)) return actions[action](player);
          if (actions[action]) actions[action]();
        });
      });
      document.querySelectorAll('[data-sound]').forEach(btn => {
        btn.addEventListener('click', () => actions.playSoundButton(btn.dataset.sound));
      });
      document.querySelectorAll('[data-change]').forEach(el => {
        el.addEventListener('change', () => {
          const kind = el.dataset.change;
          if (kind === 'setRound') actions.setRound(Number(el.value));
          if (kind === 'fastWinner') actions.setFastField('winnerTeam', Number(el.value));
        });
      });
      document.querySelectorAll('[data-blur]').forEach(el => {
        el.addEventListener('blur', () => {
          const kind = el.dataset.blur;
          if (kind === 'setTeamName') actions.setTeamName(Number(el.dataset.team), el.value);
          if (kind === 'setTeamScore') actions.setTeamScore(Number(el.dataset.team), el.value);
          if (kind === 'setBank') actions.setBank(el.value);
          if (kind === 'updateMember') actions.updateMember(Number(el.dataset.team), Number(el.dataset.index), el.value);
          if (kind === 'fastField') actions.setFastField(el.dataset.field, el.value);
          if (kind === 'fastRow') actions.setFastRow(Number(el.dataset.index), el.dataset.field, el.value);
        });
      });
    }

    // Atajos útiles en la pantalla del conductor.
    window.addEventListener('keydown', ev => {
      if (VIEW !== 'host') return;
      if (ev.target && ['INPUT', 'TEXTAREA', 'SELECT'].includes(ev.target.tagName)) return;
      if (ev.key >= '1' && ev.key <= '9') {
        const idx = Number(ev.key) - 1;
        if (state.mode === 'sudden' && idx < suddenDeath.answers.length) actions.revealSudden(idx);
        else if (idx < currentRound().answers.length) actions.reveal(idx);
      }
      if (ev.key.toLowerCase() === 'x') actions.addStrike();
      if (ev.key.toLowerCase() === 'm') actions.toggleMute();
      if (ev.key === 'ArrowRight') actions.nextRound();
      if (ev.key === 'ArrowLeft') actions.prevRound();
    });

    setupRemoteControl();
    render();
  </script>
</body>
</html>
